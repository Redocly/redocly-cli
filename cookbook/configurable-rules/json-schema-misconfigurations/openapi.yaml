openapi: 3.1.0
info:
  title: Redocly Cafe schema misconfigurations
  version: 1.0.0
paths: {}
components:
  schemas:
    BadCustomerName:
      type: string
      minimum: 1
      maximum: 100

    GoodPrice:
      type: integer
      minimum: 0
      maximum: 10000

    GoodCustomerName:
      type: string
      minLength: 1
      maxLength: 100

    BadOrder:
      type: object
      items:
        type: string

    GoodOrder:
      type: object
      properties:
        customerName:
          $ref: '#/components/schemas/GoodCustomerName'

    BadOrderItems:
      type: array
      properties:
        customerName:
          $ref: '#/components/schemas/GoodCustomerName'
