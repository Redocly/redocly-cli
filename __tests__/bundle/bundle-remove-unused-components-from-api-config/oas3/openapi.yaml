openapi: 3.1.0
info:
  title: Sea Life API
  version: 1.0.0
paths:
  /marine-life:
    get:
      description: Get marine life information
      responses:
        '200':
          description: Marine life response
          content:
            application/json:
              schema:
                type: object
                properties:
                  creature:
                    $ref: '#/components/schemas/Crabs'
        '400':
          content:
            application/json:
              schema:
                $ref: 'ref.yaml'
  /cancer:
    get:
      description: Get cancer information
      x-internal: true
      responses:
        '200':
          description: Cancer response
          content:
            application/json:
              schema:
                type: object
                properties:
                  disease:
                    $ref: '#/components/schemas/Cancer'
        '400':
          content:
            application/json:
              schema:
                $ref: 'ref.yaml'
components:
  schemas:
    Crabs:
      $ref: '../schemas/crabs.yaml#/Crabs'
    Shark:
      $ref: '../schemas/shark.yaml#/Shark'
    Cancer:
      $ref: '../schemas/cancer.yaml#/Cancer'
