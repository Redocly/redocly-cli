swagger: '2.0'
info:
  title: Sea Life API
  version: 1.0.0
host: sea-life-api.com
paths:
  '/marine-life':
    get:
      description: Get marine life information
      responses:
        '200':
          description: Marine life response
          schema:
            type: object
            properties:
              creature:
                $ref: '#/definitions/Crabs'
        '400':
          schema:
            $ref: 'ref.yaml'
  '/cancer':
    get:
      description: Get cancer information
      x-internal: true
      responses:
        '200':
          description: Cancer response
          schema:
            type: object
            properties:
              disease:
                $ref: '#/definitions/Cancer'
        '400':
          schema:
            $ref: 'ref.yaml'
definitions:
  Crabs:
    $ref: '../schemas/crabs.yaml#/Crabs'
  Shark:
    $ref: '../schemas/shark.yaml#/Shark'
  Cancer:
    $ref: '../schemas/cancer.yaml#/Cancer'
