swagger: '2.0'
info:
  title: Component Removal Test API
  version: 1.0.0
host: test-api.com
paths:
  '/public-endpoint':
    get:
      description: Public endpoint that uses a component
      responses:
        '200':
          description: Success response
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/UsedComponent'
        '400':
          schema:
            $ref: 'ref.yaml'
  '/internal-endpoint':
    get:
      description: Internal endpoint (will be removed by remove-x-internal)
      x-internal: true
      responses:
        '200':
          description: Internal response
          schema:
            type: object
            properties:
              internal:
                $ref: '#/definitions/InternalComponent'
        '400':
          schema:
            $ref: 'ref.yaml'
definitions:
  UsedComponent:
    $ref: '../schemas/used-component.yaml#/UsedComponent'
  InternalComponent:
    $ref: '../schemas/internal-component.yaml#/InternalComponent'
  UnusedComponent:
    $ref: '../schemas/unused-component.yaml#/UnusedComponent'
