UnusedComponent:
  type: object
  description: A component that should be removed as unused when remove-unused-components is enabled
  properties:
    type:
      type: string
      enum: [unused]
    name:
      type: string
      description: The name of the unused component
      example: 'ObsoleteComponent'
    status:
      type: string
      description: Status of the component
      example: 'Deprecated'
