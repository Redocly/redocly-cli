openapi: 3.1.0
info:
  title: spec1
  version: 1.0.0
servers:
  - url: https://api.example.com
security:
  - rootScheme: []
components:
  securitySchemes:
    rootScheme:
      type: apiKey
      in: header
      name: X-Root
    operationScheme:
      type: apiKey
      in: header
      name: X-Operation
paths:
  /pets:
    get:
      summary: Uses operation security instead of root
      operationId: getPetsWithOperationSecurity
      security:
        - operationScheme: []
      responses:
        '200':
          description: OK
