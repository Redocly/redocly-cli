openapi: 3.1.0
info:
  title: Foo
  version: 1.0.0
servers:
  - url: https://api.example.com
security:
  - oauth2: []
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/oauth/authorize
          tokenUrl: https://example.com/oauth/token
          scopes: {}
paths:
  /products:
    get:
      summary: Get products
      operationId: getProducts
      responses:
        200:
          description: OK
        400:
          description: Bad request
