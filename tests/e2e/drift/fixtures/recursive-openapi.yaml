openapi: 3.1.0
info:
  title: Recursive Test API
  version: 1.0.0
servers:
  - url: http://api.example.com
paths:
  /tree:
    get:
      operationId: getTree
      responses:
        '200':
          description: A tree.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeNode'
components:
  schemas:
    TreeNode:
      type: object
      required:
        - value
      properties:
        value:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/TreeNode'
