openapi: 3.1.0
info:
  title: Drift Test API
  version: 1.0.0
servers:
  - url: http://api.example.com
paths:
  /users:
    get:
      operationId: listUsers
      responses:
        '200':
          description: A list of users.
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created.
  /users/{id}:
    get:
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single user.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - name
                properties:
                  id:
                    type: string
                  name:
                    type: string
