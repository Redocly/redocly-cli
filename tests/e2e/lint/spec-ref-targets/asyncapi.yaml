asyncapi: 3.1.0
info:
  title: Ping service
  version: 1.0.0
servers:
  production:
    host: example.com
    protocol: ws
channels:
  ping:
    address: /ping
    servers:
      - $ref: '#/components/servers/production'
    messages:
      ping:
        $ref: '#/components/messages/ping'
operations:
  sendPing:
    action: send
    channel:
      $ref: '#/components/channels/ping'
    messages:
      - $ref: '#/components/messages/ping'
    reply:
      channel:
        $ref: '#/components/channels/pong'
      messages:
        - $ref: '#/components/messages/pong'
components:
  servers:
    production:
      host: example.com
      protocol: ws
  channels:
    ping:
      address: /ping
      messages:
        ping:
          $ref: '#/components/messages/ping'
    pong:
      address: /pong
      messages:
        pong:
          $ref: '#/components/messages/pong'
  messages:
    ping:
      payload:
        type: string
    pong:
      payload:
        type: string
