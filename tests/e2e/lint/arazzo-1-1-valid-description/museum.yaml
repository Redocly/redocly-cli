arazzo: 1.1.0
$self: museum.yaml
info:
  title: Redocly Museum API Tickets
  description: >-
    A part of imaginary, but delightful Museum API for interacting with museum services
    and information. Built with love by Redocly.
  version: 1.0.0

sourceDescriptions:
  - name: museum-api
    type: openapi
    url: museum-api.yaml

workflows:
  - workflowId: get-museum-tickets
    description: >-
      This workflow demonstrates how to buy tickets for the museum.
    parameters:
      - in: header
        name: Authorization
        value: Basic Og==
    steps:
      - stepId: buy-tickets
        description: >-
          Buy museum tickets resolving request details with buyMuseumTickets operationId from museum-api.yaml description.
        operationId: buyMuseumTickets
        requestBody:
          payload:
            ticketType: general
            ticketDate: 2023-09-07
            email: todd@example.com
          replacements:
            - target: $.ticketType
              targetSelectorType: jsonpath
              value: general
        successCriteria:
          - condition: $statusCode == 201
          - context: $response.body
            condition: $.ticketId
            type:
              type: jsonpath
              version: rfc9535
        outputs:
          ticketId:
            context: $response.body
            selector: $.ticketId
            type: jsonpath
      - stepId: confirm-tickets
        description: Confirm the purchased tickets.
        operationId: confirmMuseumTickets
        dependsOn:
          - buy-tickets
        timeout: 5000
        successCriteria:
          - condition: $statusCode == 200
    outputs:
      ticketId: $steps.buy-tickets.outputs.ticketId
