openapi: 3.1.0
info:
  title: Package Runtime API
  version: 1.0.0
servers:
  - url: http://localhost:3123
paths:
  /orders/{order-id}:
    get:
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - name: order-id
          in: path
          required: true
          schema: { type: string }
        - name: expand
          in: query
          schema: { type: string }
      responses:
        '200':
          description: The order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewOrder' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
  /configure-op:
    get:
      # Collides with the client's reserved `configure` member — the operation is renamed.
      operationId: configure
      responses:
        '200':
          description: Status.
          content:
            application/json:
              schema: { type: string }
  /events:
    get:
      operationId: streamEvents
      responses:
        '200':
          description: Order events.
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/OrderEvent' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Order:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status: { type: string }
    NewOrder:
      type: object
      required: [status]
      properties:
        status: { type: string }
    OrderEvent:
      type: object
      required: [seq]
      properties:
        seq: { type: integer }
        text: { type: string }
