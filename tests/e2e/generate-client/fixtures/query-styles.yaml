openapi: 3.0.3
info:
  title: Query Styles
  version: 1.0.0
servers:
  - url: http://localhost:3199
paths:
  /search:
    get:
      operationId: search
      parameters:
        - name: tags
          in: query
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: q
          in: query
          style: spaceDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: ids
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: filter
          in: query
          allowReserved: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: string
