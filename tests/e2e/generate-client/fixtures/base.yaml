openapi: 3.1.0
info:
  title: Base Consumer
  version: 1.0.0
  description: |
    Minimal spec that exercises core runtime behavior (real call, cancellation)
    plus edge cases discovered against the real Redocly API (reunite.yaml):
    OAS 3.1 `enum` containing `null`, and `style: deepObject` object query params.
servers:
  - url: http://localhost:3102
paths:
  /pets/{id}:
    get:
      operationId: getPetById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A single pet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets:
    get:
      operationId: listPets
      parameters:
        - name: filter
          in: query
          required: false
          style: deepObject
          explode: true
          description: Object-valued filter serialized as deepObject.
          schema:
            $ref: '#/components/schemas/PetFilter'
      responses:
        '200':
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '201':
          description: The created pet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets/{id}/cancel-test:
    get:
      operationId: getSlowPet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A slow response (used to exercise cancellation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /search:
    post:
      operationId: search
      description: |
        Name-collision regression: `operationId: search` makes the result alias name
        match the SearchResult schema it returns. The generator must not emit a circular
        self-referential alias (TS2440/TS2308 in multi-file output).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetFilter'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
  /pets/bulk:
    post:
      operationId: bulkUpsertPets
      description: |
        The 200 body is an array whose items are an *inline* discriminated union
        (`status`). The generator must emit `is<Member>` guards for that nested
        union, narrowing the items to the named member types.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Per-item results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetBulkResult'
  /status:
    get:
      operationId: getStatus
      description: |
        Name-collision regression (non-self-referential): operationId `getStatus` derives a
        result alias whose name also exists as an unrelated schema below. The generator must
        suppress the operation result alias so the two don't both declare the same type name
        (a duplicate-identifier error).
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      required: [name]
      properties:
        id:
          description: Server-assigned id; readOnly, so it is dropped from request bodies.
          type: integer
          readOnly: true
        name:
          type: string
        status:
          description: Lifecycle status; OAS 3.1 enum that includes null.
          type:
            - string
            - 'null'
          enum:
            - available
            - pending
            - sold
            - null
        metadata:
          description: Free-form object (no declared properties) — a record of unknown, not `{}`.
          type: object
        owner:
          description: oneOf with an empty branch — must stay `string`, not collapse to `unknown`.
          oneOf:
            - type: string
            - {}
        deletedAt:
          description: OAS 3.1 single null type — must render as `null`, not `unknown`.
          type: 'null'
    PetBulkSuccessItem:
      description: Discriminated-union member (status=ok) — a nested-union guard target.
      type: object
      required: [status, resource]
      properties:
        status:
          type: string
          const: ok
        resource:
          $ref: '#/components/schemas/Pet'
    PetBulkErrorItem:
      description: Discriminated-union member (status=error).
      type: object
      required: [status, error]
      properties:
        status:
          type: string
          const: error
        error:
          type: string
    PetBulkResult:
      description: Array of an inline discriminated union — guards must narrow the items.
      type: array
      items:
        oneOf:
          - $ref: '#/components/schemas/PetBulkSuccessItem'
          - $ref: '#/components/schemas/PetBulkErrorItem'
        discriminator:
          propertyName: status
          mapping:
            ok: '#/components/schemas/PetBulkSuccessItem'
            error: '#/components/schemas/PetBulkErrorItem'
    GetStatusResult:
      description: Unrelated schema whose name collides with the `getStatus` op result alias.
      type: object
      properties:
        ready:
          type: boolean
    PetFilter:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
    SearchResult:
      description: Result alias for `search` collides with this schema name (regression guard).
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pet'
    ExtendedPet:
      description: Own discriminant property AND allOf — the own property must survive the intersection.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          const: extended
      allOf:
        - $ref: '#/components/schemas/Pet'
