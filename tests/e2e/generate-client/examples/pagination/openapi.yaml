openapi: 3.1.0
info:
  title: Cafe Orders API
  description: A tiny cursor-paginated orders API for the auto-pagination example.
  version: 1.0.0
servers:
  - url: https://api.cafe-orders.example.com
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders, one cursor page at a time
      parameters:
        - name: cursor
          in: query
          description: Opaque cursor of the page to fetch; omit for the first page.
          schema:
            type: string
        - name: limit
          in: query
          description: Page size.
          schema:
            type: integer
      responses:
        '200':
          description: One page of orders.
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  nextCursor:
                    description: Cursor of the next page; absent on the last page.
                    type: string
  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Retrieve one order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Order:
      type: object
      required: [id, drink, status]
      properties:
        id:
          type: string
        drink:
          type: string
        status:
          type: string
          enum: [pending, ready, delivered]
