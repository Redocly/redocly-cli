# redocly.yaml — drives `redocly generate-client` for this example.
# generate-client settings live under the `x-client-generator` extension for now
# (first-class config support is planned in @redocly/config).
x-client-generator:
  api: ./openapi.yaml
  output: ./src/api/client.ts
  generators:
    - sdk
    - tanstack-query
  facade: functions
