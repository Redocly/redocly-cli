name: Smoke tests

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true
  REDOCLY_TELEMETRY: off

jobs:
  prepare-smoke-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare Smoke
        run: bash ./tests/smoke/plugins/prepare-smoke-plugins.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
          include-hidden-files: true
          retention-days: 1

  run-smoke-plugins--npm--node-24:
    needs: prepare-smoke-plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - run: bash ./tests/smoke/plugins/run-smoke.sh

  run-smoke-plugins--npm--node-24--windows:
    needs: prepare-smoke-plugins
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - run: bash ./tests/smoke/plugins/run-smoke.sh

  run-smoke-plugins--npm--node-22:
    needs: prepare-smoke-plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: bash ./tests/smoke/plugins/run-smoke.sh

  run-smoke-plugins--npm--node-22--windows:
    needs: prepare-smoke-plugins
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: bash ./tests/smoke/plugins/run-smoke.sh

  run-smoke-plugins--npm--node-20:
    needs: prepare-smoke-plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - run: bash ./tests/smoke/plugins/run-smoke.sh

  run-smoke-plugins--npm--node-20--windows:
    needs: prepare-smoke-plugins
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-plugins
          path: tests/smoke/plugins/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - run: bash ./tests/smoke/plugins/run-smoke.sh
