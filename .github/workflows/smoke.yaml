      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - run: bash ./tests/smoke/basic/run-smoke.sh "pnpm install" "pnpm run"

