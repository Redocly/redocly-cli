get:
  tags:
    - Products
  summary: List all menu items
  description: Retrieve a collection of menu items with optional filtering and pagination.
  operationId: listMenuItems
  security: []
  parameters:
    - $ref: ../components/parameters/After.yaml
    - $ref: ../components/parameters/Before.yaml
    - $ref: ../components/parameters/Sort.yaml
    - $ref: ../components/parameters/Filter.yaml
    - $ref: ../components/parameters/Search.yaml
    - $ref: ../components/parameters/Limit.yaml
  responses:
    '200':
      description: Successful operation.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MenuItemList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
post:
  tags:
    - Products
  summary: Create menu item
  description: Create a new menu item.
  operationId: createMenuItem
  security:
    - OAuth2:
        - menu:write
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: ../components/schemas/MenuItem.yaml
        examples:
          Beverage:
            summary: Create a beverage
            value:
              name: Cappuccino
              price: 4500
              category: beverage
              volume: 250
              containsCaffeine: true
              photoTextDescription: A hot cappuccino in a white ceramic cup.
          Dessert:
            summary: Create a dessert
            value:
              name: Chocolate-Brownie
              price: 3500
              category: dessert
              calories: 420
              photoTextDescription: A rich chocolate brownie square dusted with cocoa.
  responses:
    '201':
      description: Menu item created successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MenuItem.yaml
          examples:
            MenuItemResponse:
              value:
                id: 'prd_01khr487f7qm7p44xn427m43vb'
                object: 'menuItem'
                name: 'coffee'
                price: 4000
                category: beverage
                createdAt: '2026-02-18T10:20:38.228Z'
                updatedAt: '2026-02-18T10:20:38.228Z'
                volume: 600
                containsCaffeine: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
